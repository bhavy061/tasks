<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Manager</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.x/dist/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-page:        #f5f4f0;
      --bg-primary:     #ffffff;
      --bg-secondary:   #f0ede8;
      --text-primary:   #1a1917;
      --text-secondary: #6b6965;
      --text-tertiary:  #9e9b96;
      --border-light:   rgba(0,0,0,0.09);
      --border-mid:     rgba(0,0,0,0.16);
      --border-strong:  rgba(0,0,0,0.25);
      --radius-md:      8px;
      --radius-lg:      12px;
      --radius-xl:      16px;
      --shadow-card:    0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.04);
      --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-page:        #111110;
        --bg-primary:     #1c1b1a;
        --bg-secondary:   #242321;
        --text-primary:   #f0ede8;
        --text-secondary: #a8a49e;
        --text-tertiary:  #6b6965;
        --border-light:   rgba(255,255,255,0.08);
        --border-mid:     rgba(255,255,255,0.14);
        --border-strong:  rgba(255,255,255,0.22);
        --shadow-card:    0 1px 3px rgba(0,0,0,0.3);
      }
    }

    body {
      font-family: var(--font);
      background: var(--bg-page);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* ── Header ── */
    .app-header {
      background: var(--bg-primary);
      border-bottom: 0.5px solid var(--border-light);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .app-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }
    .app-logo .logo-icon {
      width: 30px; height: 30px;
      background: var(--text-primary);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      color: var(--bg-primary);
      font-size: 16px;
    }
    .header-meta {
      font-size: 13px;
      color: var(--text-secondary);
    }
    .btn-new {
      display: flex; align-items: center; gap: 6px;
      background: var(--text-primary);
      color: var(--bg-primary);
      border: none;
      border-radius: var(--radius-md);
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: var(--font);
      transition: opacity 0.15s;
    }
    .btn-new:hover { opacity: 0.82; }

    /* ── Board ── */
    .board-wrap {
      max-width: 1100px;
      margin: 2rem auto;
      padding: 0 1.5rem;
    }
    .columns {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }
    @media (max-width: 700px) {
      .columns { grid-template-columns: 1fr; }
      .app-header { padding: 0 1rem; }
      .board-wrap { padding: 0 1rem; }
    }

    /* ── Column ── */
    .col {
      background: var(--bg-secondary);
      border-radius: var(--radius-xl);
      border: 0.5px solid var(--border-light);
      padding: 12px;
      min-height: 480px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .col-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 4px 10px;
      border-bottom: 0.5px solid var(--border-light);
      margin-bottom: 2px;
    }
    .col-label {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .col-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot-todo   { background: #9e9b96; }
    .dot-inprog { background: #378ADD; }
    .dot-done   { background: #1D9E75; }
    .col-count {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-tertiary);
      background: var(--bg-primary);
      border: 0.5px solid var(--border-mid);
      border-radius: 20px;
      padding: 1px 9px;
    }
    .tasks-list { display: flex; flex-direction: column; gap: 8px; }

    /* ── Task card ── */
    .task-card {
      background: var(--bg-primary);
      border: 0.5px solid var(--border-light);
      border-radius: var(--radius-md);
      padding: 11px 13px;
      box-shadow: var(--shadow-card);
      position: relative;
      transition: border-color 0.15s, transform 0.12s;
    }
    .task-card:hover { border-color: var(--border-mid); }
    .task-card:hover .task-actions { opacity: 1; }

    .task-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
      line-height: 1.45;
      margin-bottom: 5px;
      padding-right: 44px;
    }
    .task-title.strikethrough {
      text-decoration: line-through;
      color: var(--text-tertiary);
    }
    .task-desc {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.55;
      margin-bottom: 10px;
    }
    .task-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
    }
    .priority-badge {
      font-size: 11px;
      font-weight: 500;
      padding: 2px 9px;
      border-radius: 20px;
      flex-shrink: 0;
    }
    .p-high   { background: #FCEBEB; color: #A32D2D; }
    .p-medium { background: #FAEEDA; color: #854F0B; }
    .p-low    { background: #EAF3DE; color: #3B6D11; }
    @media (prefers-color-scheme: dark) {
      .p-high   { background: #501313; color: #F7C1C1; }
      .p-medium { background: #412402; color: #FAC775; }
      .p-low    { background: #173404; color: #C0DD97; }
    }

    .move-btns { display: flex; gap: 4px; }
    .move-btn {
      background: none;
      border: 0.5px solid var(--border-light);
      border-radius: var(--radius-md);
      padding: 3px 8px;
      font-size: 12px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.12s;
      font-family: var(--font);
      display: flex; align-items: center; gap: 3px;
    }
    .move-btn:hover {
      background: var(--bg-secondary);
      border-color: var(--border-mid);
      color: var(--text-primary);
    }

    /* ── Card action icons ── */
    .task-actions {
      position: absolute;
      top: 9px; right: 9px;
      display: flex; gap: 2px;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: var(--text-tertiary);
      border-radius: 6px;
      transition: color 0.12s, background 0.12s;
      font-size: 15px;
      display: flex; align-items: center; justify-content: center;
      line-height: 1;
    }
    .icon-btn:hover { color: var(--text-primary); background: var(--bg-secondary); }
    .icon-btn.del:hover { color: #A32D2D; background: #FCEBEB; }
    @media (prefers-color-scheme: dark) {
      .icon-btn.del:hover { color: #F7C1C1; background: #501313; }
    }

    /* ── Add task button ── */
    .add-btn {
      display: flex; align-items: center; gap: 7px;
      background: none;
      border: 0.5px dashed var(--border-mid);
      border-radius: var(--radius-md);
      padding: 9px 13px;
      font-size: 13px;
      color: var(--text-tertiary);
      cursor: pointer;
      width: 100%;
      transition: all 0.12s;
      font-family: var(--font);
      margin-top: auto;
    }
    .add-btn:hover {
      color: var(--text-secondary);
      border-color: var(--border-strong);
      background: var(--bg-primary);
    }

    /* ── Empty state ── */
    .empty-state {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 6px; padding: 2rem 1rem;
      color: var(--text-tertiary); font-size: 13px; text-align: center;
    }
    .empty-state i { font-size: 26px; }

    /* ── Modal ── */
    .modal-backdrop {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: var(--bg-primary);
      border: 0.5px solid var(--border-mid);
      border-radius: var(--radius-xl);
      padding: 1.5rem;
      width: 400px;
      max-width: 100%;
      animation: modal-in 0.18s ease;
    }
    @keyframes modal-in {
      from { opacity: 0; transform: scale(0.96) translateY(6px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    .modal-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 1.25rem;
      color: var(--text-primary);
    }
    .form-field { margin-bottom: 14px; }
    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .form-field input,
    .form-field textarea,
    .form-field select {
      width: 100%;
      font-family: var(--font);
      font-size: 14px;
      background: var(--bg-secondary);
      border: 0.5px solid var(--border-mid);
      border-radius: var(--radius-md);
      padding: 9px 12px;
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.15s;
    }
    .form-field input:focus,
    .form-field textarea:focus,
    .form-field select:focus {
      border-color: var(--border-strong);
      background: var(--bg-primary);
    }
    .form-field textarea { resize: vertical; min-height: 72px; line-height: 1.5; }
    .form-row { display: flex; gap: 10px; }
    .form-row .form-field { flex: 1; }
    .modal-footer {
      display: flex; gap: 8px; justify-content: flex-end;
      margin-top: 1.25rem;
      padding-top: 1rem;
      border-top: 0.5px solid var(--border-light);
    }
    .btn-cancel {
      background: none;
      border: 0.5px solid var(--border-mid);
      border-radius: var(--radius-md);
      padding: 8px 18px;
      font-size: 13px;
      cursor: pointer;
      color: var(--text-secondary);
      font-family: var(--font);
      transition: all 0.12s;
    }
    .btn-cancel:hover { background: var(--bg-secondary); color: var(--text-primary); }
    .btn-save {
      background: var(--text-primary);
      color: var(--bg-primary);
      border: none;
      border-radius: var(--radius-md);
      padding: 8px 20px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: var(--font);
      transition: opacity 0.15s;
    }
    .btn-save:hover { opacity: 0.82; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 1.5rem; left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: var(--text-primary);
      color: var(--bg-primary);
      padding: 9px 20px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      z-index: 999;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Validation shake ── */
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%,60%  { transform: translateX(-5px); }
      40%,80%  { transform: translateX(5px); }
    }
    .shake { animation: shake 0.3s ease; }
  </style>
</head>
<body>

<!-- ── App Header ── -->
<header class="app-header">
  <div class="app-logo">
    <div class="logo-icon" aria-hidden="true">
      <i class="ti ti-layout-kanban"></i>
    </div>
    Task board
  </div>
  <span class="header-meta" id="board-meta">Loading…</span>
  <button class="btn-new" onclick="openModal()">
    <i class="ti ti-plus" aria-hidden="true"></i> New task
  </button>
</header>

<!-- ── Board ── -->
<main class="board-wrap">
  <div class="columns">

    <!-- Todo -->
    <div class="col">
      <div class="col-header">
        <span class="col-label">
          <span class="col-dot dot-todo"></span> Todo
        </span>
        <span class="col-count" id="cnt-todo">0</span>
      </div>
      <div class="tasks-list" id="tasks-todo"></div>
      <button class="add-btn" onclick="openModal('todo')">
        <i class="ti ti-plus" aria-hidden="true" style="font-size:14px;"></i> Add task
      </button>
    </div>

    <!-- In Progress -->
    <div class="col">
      <div class="col-header">
        <span class="col-label">
          <span class="col-dot dot-inprog"></span> In progress
        </span>
        <span class="col-count" id="cnt-inprog">0</span>
      </div>
      <div class="tasks-list" id="tasks-inprog"></div>
      <button class="add-btn" onclick="openModal('inprog')">
        <i class="ti ti-plus" aria-hidden="true" style="font-size:14px;"></i> Add task
      </button>
    </div>

    <!-- Done -->
    <div class="col">
      <div class="col-header">
        <span class="col-label">
          <span class="col-dot dot-done"></span> Done
        </span>
        <span class="col-count" id="cnt-done">0</span>
      </div>
      <div class="tasks-list" id="tasks-done"></div>
      <button class="add-btn" onclick="openModal('done')">
        <i class="ti ti-plus" aria-hidden="true" style="font-size:14px;"></i> Add task
      </button>
    </div>

  </div>
</main>

<!-- ── Modal ── -->
<div class="modal-backdrop" id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-heading">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title" id="modal-heading">New task</div>

    <div class="form-field">
      <label class="form-label" for="f-title">Title</label>
      <input id="f-title" type="text" placeholder="What needs to be done?" maxlength="100" />
    </div>

    <div class="form-field">
      <label class="form-label" for="f-desc">Description <span style="font-weight:400;text-transform:none;letter-spacing:0;">(optional)</span></label>
      <textarea id="f-desc" placeholder="Add some details…"></textarea>
    </div>

    <div class="form-row">
      <div class="form-field">
        <label class="form-label" for="f-stage">Stage</label>
        <select id="f-stage">
          <option value="todo">Todo</option>
          <option value="inprog">In progress</option>
          <option value="done">Done</option>
        </select>
      </div>
      <div class="form-field">
        <label class="form-label" for="f-priority">Priority</label>
        <select id="f-priority">
          <option value="medium">Medium</option>
          <option value="high">High</option>
          <option value="low">Low</option>
        </select>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" id="save-btn" onclick="saveTask()">Add task</button>
    </div>
  </div>
</div>

<!-- ── Toast ── -->
<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
  /* ── State ── */
  let tasks = [];
  let editId = null;
  let idCounter = 1;

  const STAGES = ['todo', 'inprog', 'done'];
  const STAGE_LABELS = { todo: 'Todo', inprog: 'In progress', done: 'Done' };
  const PREV_STAGE = { inprog: 'todo', done: 'inprog' };
  const NEXT_STAGE = { todo: 'inprog', inprog: 'done' };

  /* ── Seed data ── */
  const seed = [
    { title: 'Design system tokens',     desc: 'Define color, spacing, and type scale',             stage: 'done',   priority: 'high'   },
    { title: 'Set up CI/CD pipeline',    desc: 'GitHub Actions with auto-deploy to staging',         stage: 'done',   priority: 'medium' },
    { title: 'Build auth flow',          desc: 'Login, signup, and password reset screens',          stage: 'inprog', priority: 'high'   },
    { title: 'Write API docs',           desc: 'Document all endpoints with examples',               stage: 'inprog', priority: 'low'    },
    { title: 'User onboarding flow',     desc: 'Welcome screen and feature walkthrough',             stage: 'todo',   priority: 'medium' },
    { title: 'Performance audit',        desc: 'Lighthouse scores above 90 on all pages',            stage: 'todo',   priority: 'low'    },
    { title: 'Accessibility review',     desc: 'WCAG 2.1 AA compliance check',                      stage: 'todo',   priority: 'medium' },
  ];
  seed.forEach(t => tasks.push({ ...t, id: idCounter++ }));

  /* ── Render ── */
  function render() {
    STAGES.forEach(stage => {
      const stageTasks = tasks.filter(t => t.stage === stage);
      document.getElementById('cnt-' + stage).textContent = stageTasks.length;

      const container = document.getElementById('tasks-' + stage);
      if (stageTasks.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <i class="ti ti-inbox" aria-hidden="true"></i>
            <span>No tasks yet</span>
          </div>`;
      } else {
        container.innerHTML = stageTasks.map(cardHTML).join('');
      }
    });

    const total = tasks.length;
    const done  = tasks.filter(t => t.stage === 'done').length;
    document.getElementById('board-meta').textContent =
      `${total} task${total !== 1 ? 's' : ''} · ${done} completed`;
  }

  function cardHTML(t) {
    const hasPrev = !!PREV_STAGE[t.stage];
    const hasNext = !!NEXT_STAGE[t.stage];

    const moveBtns = `
      <div class="move-btns">
        ${hasPrev ? `<button class="move-btn" onclick="moveTask(${t.id},'${PREV_STAGE[t.stage]}')" title="Move to ${STAGE_LABELS[PREV_STAGE[t.stage]]}">
            <i class="ti ti-arrow-left" aria-hidden="true"></i>
          </button>` : ''}
        ${hasNext ? `<button class="move-btn" onclick="moveTask(${t.id},'${NEXT_STAGE[t.stage]}')" title="Move to ${STAGE_LABELS[NEXT_STAGE[t.stage]]}">
            <i class="ti ti-arrow-right" aria-hidden="true"></i>
          </button>` : ''}
      </div>`;

    return `
      <div class="task-card" id="card-${t.id}">
        <div class="task-actions">
          <button class="icon-btn" onclick="editTask(${t.id})" title="Edit task" aria-label="Edit task">
            <i class="ti ti-edit" aria-hidden="true"></i>
          </button>
          <button class="icon-btn del" onclick="deleteTask(${t.id})" title="Delete task" aria-label="Delete task">
            <i class="ti ti-trash" aria-hidden="true"></i>
          </button>
        </div>
        <div class="task-title ${t.stage === 'done' ? 'strikethrough' : ''}">${escHtml(t.title)}</div>
        ${t.desc ? `<div class="task-desc">${escHtml(t.desc)}</div>` : ''}
        <div class="task-footer">
          <span class="priority-badge p-${t.priority}">${capitalize(t.priority)}</span>
          ${moveBtns}
        </div>
      </div>`;
  }

  /* ── Helpers ── */
  function escHtml(str) {
    const el = document.createElement('div');
    el.textContent = str;
    return el.innerHTML;
  }
  function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

  /* ── Modal ── */
  function openModal(stage) {
    editId = null;
    document.getElementById('modal-heading').textContent = 'New task';
    document.getElementById('save-btn').textContent      = 'Add task';
    document.getElementById('f-title').value             = '';
    document.getElementById('f-desc').value              = '';
    document.getElementById('f-stage').value             = stage || 'todo';
    document.getElementById('f-priority').value          = 'medium';
    document.getElementById('modal').classList.add('open');
    setTimeout(() => document.getElementById('f-title').focus(), 60);
  }

  function editTask(id) {
    const t = tasks.find(x => x.id === id);
    if (!t) return;
    editId = id;
    document.getElementById('modal-heading').textContent = 'Edit task';
    document.getElementById('save-btn').textContent      = 'Save changes';
    document.getElementById('f-title').value             = t.title;
    document.getElementById('f-desc').value              = t.desc || '';
    document.getElementById('f-stage').value             = t.stage;
    document.getElementById('f-priority').value          = t.priority;
    document.getElementById('modal').classList.add('open');
    setTimeout(() => document.getElementById('f-title').focus(), 60);
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('open');
  }

  function saveTask() {
    const title = document.getElementById('f-title').value.trim();
    if (!title) {
      const input = document.getElementById('f-title');
      input.classList.remove('shake');
      void input.offsetWidth; // reflow
      input.classList.add('shake');
      input.focus();
      return;
    }
    const stage    = document.getElementById('f-stage').value;
    const priority = document.getElementById('f-priority').value;
    const desc     = document.getElementById('f-desc').value.trim();

    if (editId !== null) {
      const t = tasks.find(x => x.id === editId);
      if (t) Object.assign(t, { title, desc, stage, priority });
      showToast('Task updated');
    } else {
      tasks.push({ id: idCounter++, title, desc, stage, priority });
      showToast('Task added');
    }
    closeModal();
    render();
  }

  function deleteTask(id) {
    const card = document.getElementById('card-' + id);
    if (card) {
      card.style.transition = 'opacity 0.15s, transform 0.15s';
      card.style.opacity    = '0';
      card.style.transform  = 'scale(0.95)';
      setTimeout(() => {
        tasks = tasks.filter(t => t.id !== id);
        render();
      }, 150);
    } else {
      tasks = tasks.filter(t => t.id !== id);
      render();
    }
    showToast('Task deleted');
  }

  function moveTask(id, stage) {
    const t = tasks.find(x => x.id === id);
    if (t) t.stage = stage;
    render();
    showToast(`Moved to ${STAGE_LABELS[stage]}`);
  }

  /* ── Toast ── */
  let toastTimer = null;
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
  }

  /* ── Keyboard & backdrop ── */
  document.getElementById('modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });
  document.addEventListener('keydown', e => {
    if (!document.getElementById('modal').classList.contains('open')) return;
    if (e.key === 'Escape') closeModal();
    if (e.key === 'Enter' && e.target.tagName !== 'TEXTAREA') saveTask();
  });

  /* ── Init ── */
  render();
</script>
</body>
</html>
